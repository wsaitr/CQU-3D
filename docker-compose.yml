# =============================================================================
# CQU3D — 本地开发模式（单机 docker compose）
# =============================================================================
# 热更新: api/dispatcher/worker 的 Python 代码通过 volume 挂载到容器，
# 修改后只需 `docker compose restart <service>`，无需重建镜像。
#
# 生产部署请使用 deploy/ 下的分离部署方案:
#   - 代码通过 Dockerfile COPY 到镜像内，不依赖 host 文件
#   - CPU 侧:  deploy/cpu/docker-compose.cpu.yml  + deploy/cpu/.env.cpu
#   - GPU 侧:  deploy/gpu/docker-compose.gpu.yml  + deploy/gpu/.env.gpu
# =============================================================================
services:
  mysql:
    image: mysql:8.0
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change_me_root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-repo_db}
      MYSQL_USER: ${MYSQL_USER:-repo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change_me_app}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infra/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER:-repo_user}", "-p${MYSQL_PASSWORD:-change_me_app}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    env_file:
      - .env
    volumes:
      - ./apps/web:/usr/share/nginx/html:ro
      - ./infra/docker/web.nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /workspace/repo
    volumes:
      - ./storage:/workspace/repo/storage
      - ./apps/api:/workspace/repo/apps/api:ro
      - ./packages/shared:/workspace/repo/packages/shared:ro
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  dispatcher:
    build:
      context: .
      dockerfile: infra/docker/dispatcher.Dockerfile
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /workspace/repo
    volumes:
      - ./storage:/workspace/repo/storage
      - ./apps/dispatcher:/workspace/repo/apps/dispatcher:ro
      - ./packages/shared:/workspace/repo/packages/shared:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
      additional_contexts:
        dynamic2dgs: ../dynamic-2dgs
        wheelhouse: ../whl
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace/repo
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      DYNAMIC_2DGS_ROOT: /workspace/repo/services/dynamic-2dgs
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
    volumes:
      - ./storage:/workspace/repo/storage
      - ./apps/worker:/workspace/repo/apps/worker:ro
      - ./packages/shared:/workspace/repo/packages/shared:ro
      - ../dynamic-2dgs:/workspace/repo/services/dynamic-2dgs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      dispatcher:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
