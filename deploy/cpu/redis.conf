bind 0.0.0.0
protected-mode no
port 6379

dir /data

appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
aof-use-rdb-preamble yes

dbfilename dump.rdb
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error no

maxmemory-policy noeviction

tcp-keepalive 60
timeout 0
